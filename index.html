<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>로그인 | HR/운영관리</title>
  <link rel="stylesheet" href="assets/css/common.css" />
</head>
<body>
  <main class="login-shell">
    <section class="login-card">
      <h1>HR/운영관리 시스템</h1>
      <p class="muted">실개발 전 시연용 로그인</p>
      <div class="toolbar" style="flex-direction:column; align-items:stretch;">
        <input id="userId" placeholder="아이디" value="demo-admin" />
        <input id="userPw" type="password" placeholder="비밀번호" value="1234" />
        <select id="roleSelect">
          <option>플래너</option>
          <option>점장</option>
          <option>팀장</option>
          <option>담당</option>
          <option>사무실</option>
        </select>
        <button id="loginBtn" class="primary">로그인</button>
      </div>
    </section>
  </main>
  <script>
    document.getElementById('loginBtn').addEventListener('click', function () {
      const role = document.getElementById('roleSelect').value;
      localStorage.setItem('mock_role', role);
      location.href = 'front.html';
    });
  </script>
</body>
</html>
