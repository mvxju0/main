<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>메인페이지</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 24px 16px;
      background:
        radial-gradient(circle at top, rgba(216, 0, 108, 0.18), transparent 30%),
        radial-gradient(circle at bottom, rgba(255, 196, 0, 0.12), transparent 28%),
        linear-gradient(180deg, #120814 0%, #1b0d22 45%, #0f172a 100%);
      font-family: 'Pretendard', sans-serif;
    }

    .container {
      width: 100%;
      max-width: 520px;
      text-align: center;
      background: rgba(20, 12, 26, 0.72);
      border: 1px solid rgba(255, 215, 120, 0.16);
      border-radius: 24px;
      padding: 22px 18px 26px;
      box-shadow:
        0 16px 40px rgba(0, 0, 0, 0.35),
        inset 0 0 0 1px rgba(255, 255, 255, 0.04);
      backdrop-filter: blur(6px);
    }

    .hero-gif {
      width: 100%;
      max-width: 360px;
      display: block;
      margin: 0 auto 18px;
      border-radius: 18px;
      box-shadow:
        0 10px 28px rgba(0, 0, 0, 0.32),
        0 0 18px rgba(255, 214, 102, 0.18);
      border: 1px solid rgba(255, 215, 120, 0.18);
    }

    .sub-copy {
      color: #f7c95b;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.18em;
      margin-bottom: 8px;
      text-transform: uppercase;
    }

    h1 {
      color: #fff7e6;
      margin: 0 0 10px;
      font-size: 34px;
      line-height: 1.2;
      text-shadow:
        0 0 10px rgba(255, 213, 102, 0.18),
        0 2px 12px rgba(0, 0, 0, 0.35);
    }

    .desc {
      color: #d6ccda;
      font-size: 15px;
      line-height: 1.6;
      margin: 0 0 24px;
    }

    .btn-group {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .btn {
      display: block;
      width: 100%;
      min-height: 72px;
      padding: 18px 20px;
      font-size: 22px;
      font-weight: 800;
      color: #fffaf2;
      background: linear-gradient(135deg, #ff2f92 0%, #d8006c 45%, #8d003f 100%);
      border: 1px solid rgba(255, 214, 102, 0.24);
      border-radius: 18px;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease, filter 0.2s ease;
      box-shadow:
        0 10px 24px rgba(216, 0, 108, 0.28),
        inset 0 1px 0 rgba(255, 255, 255, 0.18);
      text-shadow: 0 1px 6px rgba(0, 0, 0, 0.28);
    }

    .btn:hover {
      transform: translateY(-2px) scale(1.01);
      filter: brightness(1.05);
      box-shadow:
        0 14px 30px rgba(216, 0, 108, 0.34),
        0 0 18px rgba(255, 214, 102, 0.12),
        inset 0 1px 0 rgba(255, 255, 255, 0.18);
    }

    .btn span {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: rgba(255, 246, 224, 0.82);
      margin-top: 6px;
      letter-spacing: 0.04em;
    }

    @media (max-width: 640px) {
      body {
        padding: 16px 12px;
        align-items: flex-start;
      }

      .container {
        padding: 18px 14px 22px;
        border-radius: 20px;
      }

      .hero-gif {
        max-width: 100%;
        margin-bottom: 16px;
      }

      .sub-copy {
        font-size: 12px;
        margin-bottom: 6px;
      }

      h1 {
        font-size: 28px;
        margin-bottom: 10px;
      }

      .desc {
        font-size: 14px;
        margin-bottom: 20px;
      }

      .btn {
        min-height: 78px;
        font-size: 24px;
        border-radius: 16px;
      }

      .btn span {
        font-size: 12px;
      }
    }
  </style>
</head>
<body>

  <div class="container">
    <img
      class="hero-gif"
      src="https://media2.giphy.com/media/v1.Y2lkPTZjMDliOTUyOGY1ZzFyNG13NG11MTdpbDM4MHZ5aDdmaGh5eWk0ZXRyZzhmdG8zaCZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/PhdC5X5qr6mzK/giphy.gif"
      alt="카지노 분위기 GIF"
    >

    <div class="sub-copy">LUCKY SELECT</div>
    <h1>쥬지노</h1>
    <p class="desc">
      오늘의 운을 시험해볼 시간.<br>
      원하는 게임을 골라 바로 입장하세요.
    </p>

    <div class="btn-group">
      <button class="btn" onclick="location.href='race.html'">
        애니멀런
        <span>막판 추월과 반전이 터지는 관람형 레이스</span>
      </button>

      <button class="btn" onclick="location.href='roulette.html'">
        애니멀룰렛
        <span>한 번 더 누르게 되는 슬롯형 미니게임</span>
      </button>
    </div>
  </div>

</body>
</html>
