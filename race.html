<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>애니멀런</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(180deg, #fff9f2, #ffe8d9);
      color: #222;
      padding: 24px 14px 40px;
    }

    .wrap {
      width: 100%;
      max-width: 900px;
      margin: 0 auto;
    }

    .panel {
      background: rgba(255,255,255,0.92);
      border-radius: 22px;
      padding: 20px;
      box-shadow: 0 10px 28px rgba(0,0,0,0.08);
      margin-bottom: 16px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 30px;
      text-align: center;
    }

    .sub {
      margin: 0;
      text-align: center;
      color: #666;
      font-size: 15px;
    }

    .input-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 16px;
    }

    input, button {
      font: inherit;
    }

    input {
      flex: 1;
      min-width: 200px;
      height: 48px;
      border: 1px solid #e4d5c9;
      border-radius: 14px;
      padding: 0 14px;
      background: #fff;
    }

    button {
      border: 0;
      border-radius: 14px;
      padding: 0 18px;
      height: 48px;
      font-weight: bold;
      cursor: pointer;
      background: #ff7b54;
      color: #fff;
      transition: transform 0.15s ease, opacity 0.15s ease;
    }

    button:hover { transform: translateY(-1px); }
    button:disabled { opacity: 0.55; cursor: not-allowed; }

    .ghost-btn {
      background: #fff3ea;
      color: #b45533;
      border: 1px solid #ffd3be;
    }

    .danger-btn {
      height: 36px;
      border-radius: 10px;
      background: #fff1f1;
      color: #c44;
      border: 1px solid #f3c9c9;
      padding: 0 12px;
    }

    .participants {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 14px;
    }

    .participant {
      display: grid;
      grid-template-columns: 56px 1fr auto auto;
      gap: 10px;
      align-items: center;
      background: #fff8f1;
      border: 1px solid #ffe0cc;
      border-radius: 14px;
      padding: 12px 14px;
    }

    .emoji {
      font-size: 30px;
      text-align: center;
    }

    .name {
      font-weight: bold;
      font-size: 16px;
    }

    .chance {
      color: #8a5b43;
      font-weight: bold;
      white-space: nowrap;
    }

    .helper {
      margin-top: 12px;
      color: #666;
      font-size: 14px;
    }

    .action-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 16px;
    }

    .race-wrap {
      display: none;
    }

    .race-wrap.show {
      display: block;
    }

    .race-status {
      text-align: center;
      font-size: 20px;
      font-weight: bold;
      min-height: 30px;
      margin-bottom: 14px;
    }

    .race-status.hot {
      color: #c85a16;
      animation: blink 0.45s ease-in-out infinite alternate;
    }

    .race-status.finish {
      color: #c92b2b;
    }

    @keyframes blink {
      from { opacity: 0.68; transform: scale(1); }
      to { opacity: 1; transform: scale(1.02); }
    }

    .track-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .track {
      position: relative;
      background: #fff8f1;
      border: 1px solid #ffe0cc;
      border-radius: 16px;
      padding: 12px 12px 16px;
      overflow: hidden;
    }

    .track-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 10px;
    }

    .track-name {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: bold;
    }

    .track-name .emoji {
      font-size: 28px;
    }

    .lane {
      position: relative;
      height: 18px;
      background: linear-gradient(90deg, #f7e7db, #fdf3ec);
      border-radius: 999px;
      overflow: visible;
    }

    .runner {
      position: absolute;
      top: 50%;
      left: 0;
      transform: translate(-8px, -50%);
      font-size: 28px;
      transition: transform 0.08s linear;
      will-change: transform;
    }

    .finish-line {
      position: absolute;
      right: 8px;
      top: 8px;
      bottom: 8px;
      width: 6px;
      border-radius: 999px;
      background: repeating-linear-gradient(
        to bottom,
        #222 0 8px,
        #fff 8px 16px
      );
      opacity: 0.22;
    }

    .track.first-place {
      box-shadow: 0 0 0 2px #ffd86f inset, 0 0 20px rgba(255, 204, 0, 0.18);
    }

    .track.second-place {
      box-shadow: 0 0 0 2px #ffcaa8 inset, 0 0 20px rgba(255, 136, 51, 0.12);
    }

    .result-box {
      margin-top: 16px;
      background: #fff8f1;
      border: 1px solid #ffe0cc;
      border-radius: 16px;
      padding: 16px;
      display: none;
    }

    .result-box.show {
      display: block;
    }

    .result-title {
      font-size: 22px;
      font-weight: bold;
      margin-bottom: 8px;
    }

    .result-sub {
      color: #6a5a50;
      margin-bottom: 12px;
      font-size: 15px;
    }

    .ranking {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 14px;
    }

    .ranking-item {
      background: #fff;
      border: 1px solid #f2dfd0;
      border-radius: 12px;
      padding: 10px 12px;
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
    }

    .ranking-left {
      display: flex;
      gap: 10px;
      align-items: center;
      font-weight: bold;
    }

    .double-btn {
      width: 100%;
      font-size: 18px;
      height: 54px;
      border-radius: 16px;
      background: linear-gradient(90deg, #ff6b3d, #ff8d5f);
      box-shadow: 0 10px 24px rgba(255,107,61,0.28);
    }

    .empty {
      text-align: center;
      color: #777;
      padding: 18px 0 8px;
    }

    @media (max-width: 640px) {
      .participant {
        grid-template-columns: 50px 1fr;
      }

      .chance {
        justify-self: start;
      }

      .danger-btn {
        justify-self: end;
      }

      .track-top {
        flex-direction: column;
        align-items: flex-start;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="panel">
      <h1>애니멀런</h1>
      <p class="sub">참가자를 추가하고, 확률을 확인한 뒤, 한 화면에서 같이 보는 레이스를 시작하세요.</p>

      <div class="input-row">
        <input id="nameInput" type="text" placeholder="참가자 이름 입력" maxlength="12" />
        <button id="addBtn">참가자 추가</button>
        <button id="shuffleBtn" class="ghost-btn">확률 다시 섞기</button>
      </div>

      <div class="participants" id="participantsList"></div>
      <div class="empty" id="emptyText">아직 참가자가 없습니다.</div>

      <div class="helper" id="totalChanceText">총 예상 확률: 0%</div>

      <div class="action-row">
        <button id="startBtn">레이스 시작</button>
      </div>
    </div>

    <div class="panel race-wrap" id="raceWrap">
      <div class="race-status" id="raceStatus">출발 준비 중…</div>
      <div class="track-list" id="trackList"></div>

      <div class="result-box" id="resultBox">
        <div class="result-title" id="resultTitle"></div>
        <div class="result-sub" id="resultSub"></div>
        <div class="ranking" id="ranking"></div>
        <button class="double-btn" id="doubleBtn">묻고 더블로 🔥</button>
      </div>
    </div>
  </div>

  <script>
    const animalPool = ["🐶", "🐱", "🐰", "🦊", "🐼", "🐸", "🐵", "🐯", "🐹", "🐻"];
    const participants = [];
    let chanceMap = [];
    let raceRunning = false;
    let currentRaceData = [];

    const nameInput = document.getElementById("nameInput");
    const addBtn = document.getElementById("addBtn");
    const shuffleBtn = document.getElementById("shuffleBtn");
    const startBtn = document.getElementById("startBtn");
    const participantsList = document.getElementById("participantsList");
    const emptyText = document.getElementById("emptyText");
    const totalChanceText = document.getElementById("totalChanceText");

    const raceWrap = document.getElementById("raceWrap");
    const trackList = document.getElementById("trackList");
    const raceStatus = document.getElementById("raceStatus");
    const resultBox = document.getElementById("resultBox");
    const resultTitle = document.getElementById("resultTitle");
    const resultSub = document.getElementById("resultSub");
    const ranking = document.getElementById("ranking");
    const doubleBtn = document.getElementById("doubleBtn");

    function randomInt(min, max) {
      return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    function getUnusedEmoji() {
      const used = participants.map(p => p.emoji);
      const available = animalPool.filter(a => !used.includes(a));
      if (available.length > 0) return available[Math.floor(Math.random() * available.length)];
      return animalPool[Math.floor(Math.random() * animalPool.length)];
    }

    function normalizeChances(weights) {
      const total = weights.reduce((a, b) => a + b, 0);
      const raw = weights.map(w => (w / total) * 100);
      const rounded = raw.map(v => Math.floor(v));
      let diff = 100 - rounded.reduce((a, b) => a + b, 0);

      const decimals = raw.map((v, i) => ({ i, d: v - Math.floor(v) }))
        .sort((a, b) => b.d - a.d);

      for (let k = 0; k < diff; k++) {
        rounded[decimals[k % decimals.length].i]++;
      }
      return rounded;
    }

    function assignChances() {
      if (participants.length === 0) {
        chanceMap = [];
        return;
      }
      const weights = participants.map(() => randomInt(60, 140));
      chanceMap = normalizeChances(weights);
    }

    function renderParticipants() {
      participantsList.innerHTML = "";

      if (participants.length === 0) {
        emptyText.style.display = "block";
        totalChanceText.textContent = "총 예상 확률: 0%";
        return;
      }

      emptyText.style.display = "none";

      participants.forEach((p, i) => {
        const row = document.createElement("div");
        row.className = "participant";
        row.innerHTML = `
          <div class="emoji">${p.emoji}</div>
          <div class="name">${p.name}</div>
          <div class="chance">예상 ${chanceMap[i]}%</div>
          <button class="danger-btn" data-index="${i}">삭제</button>
        `;
        participantsList.appendChild(row);
      });

      const sum = chanceMap.reduce((a, b) => a + b, 0);
      totalChanceText.textContent = `총 예상 확률: ${sum}%`;
    }

    function addParticipant() {
      const name = nameInput.value.trim();
      if (!name) return;
      if (participants.length >= 8) {
        alert("참가자는 최대 8명까지 가능합니다.");
        return;
      }

      participants.push({
        id: Date.now() + Math.random(),
        name,
        emoji: getUnusedEmoji()
      });

      assignChances();
      renderParticipants();
      nameInput.value = "";
      nameInput.focus();
    }

    function removeParticipant(index) {
      participants.splice(index, 1);
      assignChances();
      renderParticipants();
    }

    function buildRaceData() {
      currentRaceData = participants.map((p, i) => ({
        ...p,
        chance: chanceMap[i],
        progress: 0,
        speed: 0,
        finishedAt: null,
        rank: null
      }));
    }

    function renderTracks() {
      trackList.innerHTML = "";
      currentRaceData.forEach((p, i) => {
        const track = document.createElement("div");
        track.className = "track";
        track.id = `track-${i}`;
        track.innerHTML = `
          <div class="finish-line"></div>
          <div class="track-top">
            <div class="track-name">
              <div class="emoji">${p.emoji}</div>
              <div>${p.name}</div>
            </div>
            <div>예상 우승 ${p.chance}%</div>
          </div>
          <div class="lane">
            <div class="runner" id="runner-${i}">${p.emoji}</div>
          </div>
        `;
        trackList.appendChild(track);
      });
    }

    function weightedBaseSpeed(chance) {
      return 0.45 + (chance / 100) * 0.35;
    }

    function sleep(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    async function startRace() {
      if (participants.length < 2) {
        alert("참가자는 최소 2명 이상이어야 합니다.");
        return;
      }
      if (raceRunning) return;

      raceRunning = true;
      resultBox.classList.remove("show");
      raceWrap.classList.add("show");
      raceStatus.textContent = "출발 준비 중…";
      raceStatus.classList.remove("hot", "finish");

      buildRaceData();
      renderTracks();

      await sleep(500);
      raceStatus.textContent = "3";
      await sleep(500);
      raceStatus.textContent = "2";
      await sleep(500);
      raceStatus.textContent = "1";
      await sleep(500);
      raceStatus.textContent = "출발!";
      await sleep(300);

      const raceStart = performance.now();
      let finishCount = 0;
      let animationFrame = null;
      let nearFinishTriggered = false;

      function frame(now) {
        const elapsed = now - raceStart;

        const unfinished = currentRaceData.filter(p => p.finishedAt === null);
        const sortedByProgress = [...currentRaceData].sort((a, b) => b.progress - a.progress);

        currentRaceData.forEach((p, i) => {
          if (p.finishedAt !== null) return;

          let speed = weightedBaseSpeed(p.chance);

          // 초반은 비교적 안정
          if (elapsed < 1800) {
            speed += (Math.random() - 0.5) * 0.12;
          }

          // 중반 혼전: 속도 크게 요동
          if (p.progress > 18 && p.progress < 78) {
            speed += (Math.random() - 0.5) * 1.35;
          }

          // 후반 들어가면 약간 조심스러워짐
          if (p.progress >= 78 && p.progress < 92) {
            speed += (Math.random() - 0.5) * 0.7;
          }

          // 결승선 앞 1,2등 왔다갔다
          const first = sortedByProgress[0];
          const second = sortedByProgress[1];

          if (p.progress >= 90 && first && second) {
            const isTopTwo = p.id === first.id || p.id === second.id;
            if (isTopTwo) {
              const swing = Math.sin(now / 120) * 1.1;
              speed += swing;

              if (!nearFinishTriggered) {
                raceStatus.textContent = "결승선 앞 초접전!";
                raceStatus.classList.add("hot");
              }
              nearFinishTriggered = true;
            } else {
              speed *= 0.7;
            }
          }

          speed = Math.max(0.08, speed);
          p.progress += speed;

          if (p.progress >= 100) {
            p.progress = 100;
            p.finishedAt = now;
            finishCount++;
            p.rank = finishCount;
          }

          const runner = document.getElementById(`runner-${i}`);
          runner.style.transform = `translate(calc(${p.progress}% - 8px), -50%)`;
        });

        // 상위 2명 하이라이트
        document.querySelectorAll(".track").forEach(el => {
          el.classList.remove("first-place", "second-place");
        });

        const liveSorted = [...currentRaceData].sort((a, b) => b.progress - a.progress);
        if (liveSorted[0]) {
          const idx1 = currentRaceData.findIndex(x => x.id === liveSorted[0].id);
          document.getElementById(`track-${idx1}`)?.classList.add("first-place");
        }
        if (liveSorted[1]) {
          const idx2 = currentRaceData.findIndex(x => x.id === liveSorted[1].id);
          document.getElementById(`track-${idx2}`)?.classList.add("second-place");
        }

        if (finishCount === currentRaceData.length) {
          finalizeRace();
          raceRunning = false;
          cancelAnimationFrame(animationFrame);
          return;
        }

        animationFrame = requestAnimationFrame(frame);
      }

      function finalizeRace() {
        const result = [...currentRaceData].sort((a, b) => {
          if (a.rank !== null && b.rank !== null) return a.rank - b.rank;
          return (a.finishedAt || Infinity) - (b.finishedAt || Infinity);
        });

        const winner = result[0];
        const second = result[1];

        raceStatus.classList.remove("hot");
        raceStatus.classList.add("finish");
        raceStatus.textContent = `${winner.emoji} ${winner.name} 우승!`;

        let diffText = "";
        if (winner && second && winner.finishedAt && second.finishedAt) {
          const sec = ((second.finishedAt - winner.finishedAt) / 1000).toFixed(2);
          diffText = `${sec}초 차이`;
        }

        resultTitle.textContent = `${winner.emoji} ${winner.name} 우승!`;
        resultSub.textContent = second
          ? `${winner.chance}% 예상 우승 확률 · 2위와 ${diffText}`
          : `${winner.chance}% 예상 우승 확률`;

        ranking.innerHTML = result.map((p, idx) => `
          <div class="ranking-item">
            <div class="ranking-left">
              <div>${idx + 1}위</div>
              <div>${p.emoji}</div>
              <div>${p.name}</div>
            </div>
            <div>예상 ${p.chance}%</div>
          </div>
        `).join("");

        resultBox.classList.add("show");
      }

      requestAnimationFrame(frame);
    }

    addBtn.addEventListener("click", addParticipant);
    shuffleBtn.addEventListener("click", () => {
      if (participants.length === 0) return;
      assignChances();
      renderParticipants();
    });

    startBtn.addEventListener("click", startRace);

    participantsList.addEventListener("click", (e) => {
      const btn = e.target.closest(".danger-btn");
      if (!btn) return;
      removeParticipant(Number(btn.dataset.index));
    });

    nameInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") addParticipant();
    });

    doubleBtn.addEventListener("click", () => {
      startRace();
    });

    // 기본 샘플
    ["토끼", "강아지", "고양이", "여우"].forEach(name => {
      participants.push({
        id: Date.now() + Math.random(),
        name,
        emoji: getUnusedEmoji()
      });
    });
    assignChances();
    renderParticipants();
  </script>
</body>
</html>
