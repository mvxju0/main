<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>이모지 레이스</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background:
        radial-gradient(circle at top, rgba(96,165,250,0.16), transparent 32%),
        linear-gradient(180deg, #f8fbff 0%, #eef4ff 48%, #e8eef8 100%);
      color: #0f172a;
      padding: 24px;
    }
    .wrap { max-width: 1040px; margin: 0 auto; }
    .card {
      background: rgba(255,255,255,0.92);
      border: 1px solid rgba(148,163,184,0.2);
      border-radius: 28px;
      box-shadow: 0 18px 48px rgba(15, 23, 42, 0.10);
      overflow: hidden;
      backdrop-filter: blur(12px);
    }
    .header {
      padding: 30px 30px 20px;
      border-bottom: 1px solid rgba(148,163,184,0.14);
      background: linear-gradient(180deg, rgba(255,255,255,0.85), rgba(248,250,252,0.65));
    }
    h1 { margin: 0 0 8px; font-size: 34px; letter-spacing: -0.03em; }
    .sub { margin: 0; color: #475569; line-height: 1.55; }

    .controls {
      display: grid;
      gap: 16px;
      padding: 22px 30px 20px;
    }
    .participant-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    .participant-title { font-size: 15px; font-weight: 900; color: #334155; }
    .mini-button-row { display: flex; gap: 8px; flex-wrap: wrap; }
    .mini-btn {
      padding: 9px 12px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 700;
    }
    .control-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
    }
    .field { display: flex; flex-direction: column; gap: 8px; }
    .field label { font-size: 14px; color: #334155; font-weight: 800; }
    .field input {
      width: 100%;
      border: 1px solid #d7deea;
      border-radius: 14px;
      padding: 12px 14px;
      font-size: 15px;
      background: rgba(255,255,255,0.95);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.7);
    }
    .field input:focus {
      outline: none;
      border-color: #60a5fa;
      box-shadow: 0 0 0 4px rgba(96,165,250,0.14);
    }

    .odds-board {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
    }
    .odds-card {
      background: linear-gradient(180deg, rgba(255,255,255,0.9), rgba(241,245,249,0.95));
      border: 1px solid #e2e8f0;
      border-radius: 18px;
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      box-shadow: 0 8px 20px rgba(15,23,42,0.04);
    }
    .odds-name { font-size: 14px; font-weight: 800; }
    .odds-value { font-size: 22px; font-weight: 900; color: #1d4ed8; }
    .odds-caption { font-size: 12px; color: #64748b; }

    .button-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }
    button {
      border: none;
      border-radius: 14px;
      padding: 12px 16px;
      font-size: 15px;
      font-weight: 800;
      cursor: pointer;
      transition: transform .15s ease, opacity .15s ease, box-shadow .15s ease;
      box-shadow: 0 8px 18px rgba(15,23,42,0.08);
    }
    button:hover { transform: translateY(-1px); }
    button:active { transform: translateY(0); }
    button:disabled { opacity: .5; cursor: not-allowed; box-shadow: none; }
    .primary { background: linear-gradient(135deg, #0f172a, #1e293b); color: white; }
    .secondary { background: linear-gradient(135deg, #e2e8f0, #f8fafc); color: #0f172a; }

    .status { margin-left: auto; color: #334155; font-weight: 800; min-height: 24px; }

    .race-stage {
      padding: 0 20px 28px;
      display: none;
    }
    .race-stage.active { display: block; }

    .banner {
      margin-top: 18px;
      margin-bottom: 14px;
      border-radius: 22px;
      padding: 20px 22px;
      background:
        radial-gradient(circle at 15% 20%, rgba(255,255,255,0.22), transparent 20%),
        linear-gradient(135deg, #1d4ed8, #1e3a8a 60%, #0f172a 100%);
      color: white;
      box-shadow: 0 16px 30px rgba(29,78,216,0.24);
    }
    .banner-top {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
    }
    .banner-kicker {
      font-size: 12px;
      font-weight: 900;
      letter-spacing: 0.14em;
      opacity: 0.9;
    }
    .banner-title {
      margin-top: 8px;
      font-size: 24px;
      font-weight: 900;
      letter-spacing: -0.03em;
    }
    .banner-sub {
      margin-top: 6px;
      font-size: 14px;
      color: rgba(255,255,255,0.84);
      line-height: 1.5;
    }
    .banner-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
      margin-top: 14px;
    }
    .start-race-btn {
      background: white;
      color: #0f172a;
      box-shadow: 0 10px 22px rgba(15,23,42,0.18);
    }
    .ghost-btn {
      background: rgba(255,255,255,0.14);
      color: white;
      border: 1px solid rgba(255,255,255,0.18);
      box-shadow: none;
    }

    .hud {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: center;
      margin-bottom: 16px;
    }
    .event-log {
      min-height: 50px;
      background: linear-gradient(180deg, #ffffff, #f8fafc);
      border: 1px solid #e2e8f0;
      border-radius: 16px;
      padding: 12px 14px;
      font-weight: 800;
      color: #334155;
      display: flex;
      align-items: center;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.7);
    }
    .timer-box {
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: white;
      border-radius: 16px;
      padding: 12px 16px;
      font-weight: 900;
      min-width: 126px;
      text-align: center;
      letter-spacing: -0.02em;
      box-shadow: 0 10px 22px rgba(15,23,42,0.18);
    }

    .track-grid {
      display: grid;
      gap: 14px;
    }
    .lane-row {
      display: grid;
      grid-template-columns: 150px 1fr 96px;
      gap: 14px;
      align-items: center;
    }
    .lane-label {
      font-weight: 900;
      font-size: 18px;
      text-align: right;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: #0f172a;
    }
    .single-track {
      position: relative;
      height: 68px;
      border-radius: 999px;
      overflow: hidden;
      border: 1px solid rgba(148,163,184,0.28);
      background:
        radial-gradient(circle at 50% 0%, rgba(255,255,255,0.18), transparent 30%),
        linear-gradient(180deg, #0f172a 0%, #172554 36%, #1d4ed8 100%);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.16),
        inset 0 -1px 0 rgba(15,23,42,0.2),
        0 16px 34px rgba(30,64,175,0.14);
    }
    .single-track-sheen {
      position: absolute;
      inset: 8px 14px;
      border-radius: 999px;
      background: repeating-linear-gradient(
        90deg,
        rgba(255,255,255,0.10) 0 18px,
        rgba(255,255,255,0.02) 18px 36px
      );
      opacity: 0.5;
      pointer-events: none;
    }
    .single-track-dash {
      position: absolute;
      left: 18px;
      right: 34px;
      top: 50%;
      height: 2px;
      transform: translateY(-50%);
      background: repeating-linear-gradient(
        90deg,
        rgba(255,255,255,0.88) 0 18px,
        rgba(255,255,255,0) 18px 36px
      );
      opacity: 0.38;
      pointer-events: none;
    }
    .single-track-finish {
      position: absolute;
      right: 18px;
      top: 7px;
      bottom: 7px;
      width: 24px;
      border-radius: 8px;
      background: conic-gradient(
        from 45deg,
        #0f172a 0 25%,
        #f8fafc 0 50%,
        #0f172a 0 75%,
        #f8fafc 0 100%
      );
      background-size: 12px 12px;
      box-shadow: 0 0 0 2px rgba(255,255,255,0.12), inset 0 0 0 1px rgba(15,23,42,0.18);
      z-index: 3;
    }
    .runner {
      position: absolute;
      left: 10px;
      top: 50%;
      transform: translate(0,-50%);
      font-size: 38px;
      transition: transform .1s linear;
      filter: drop-shadow(0 6px 10px rgba(15,23,42,0.25));
      user-select: none;
      z-index: 4;
    }
    .lane-progress {
      font-weight: 900;
      font-size: 15px;
      color: #334155;
      text-align: right;
    }

    .result {
      margin-top: 16px;
      padding: 18px;
      border-radius: 20px;
      background: linear-gradient(180deg, rgba(255,255,255,0.96), rgba(248,250,252,0.96));
      border: 1px solid #e2e8f0;
      min-height: 62px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.8);
    }
    .result-title {
      font-size: 20px;
      font-weight: 900;
      text-align: center;
      margin-bottom: 14px;
    }
    .ranking-list { display: grid; gap: 10px; }
    .ranking-item {
      display: grid;
      grid-template-columns: 64px 1fr auto auto;
      gap: 12px;
      align-items: center;
      padding: 13px 14px;
      background: rgba(255,255,255,0.98);
      border: 1px solid #e2e8f0;
      border-radius: 16px;
      box-shadow: 0 8px 18px rgba(15,23,42,0.04);
    }
    .ranking-place { font-size: 18px; font-weight: 900; color: #1d4ed8; }
    .ranking-name { font-size: 16px; font-weight: 900; color: #0f172a; }
    .ranking-time { font-size: 14px; color: #0f172a; font-weight: 900; white-space: nowrap; }
    .ranking-meta { font-size: 13px; color: #64748b; font-weight: 800; white-space: nowrap; }

    @media (max-width: 900px) {
      .control-grid, .odds-board { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .hud { grid-template-columns: 1fr; }
      .timer-box { width: 100%; }
      .lane-row { grid-template-columns: 96px 1fr 72px; }
      .lane-label { font-size: 15px; }
      .ranking-item { grid-template-columns: 64px 1fr auto; }
      .ranking-meta { grid-column: 2 / -1; }
    }
    @media (max-width: 560px) {
      body { padding: 14px; }
      .header, .controls { padding-left: 16px; padding-right: 16px; }
      .race-stage { padding-left: 14px; padding-right: 14px; }
      .control-grid, .odds-board { grid-template-columns: 1fr; }
      .button-row { flex-direction: column; align-items: stretch; }
      .participant-top { align-items: stretch; }
      .mini-button-row { width: 100%; }
      .mini-button-row button { flex: 1; }
      .status { margin-left: 0; }
      .banner-top { align-items: flex-start; }
      .lane-row { grid-template-columns: 1fr; gap: 6px; }
      .lane-label { text-align: left; }
      .lane-progress { text-align: right; }
      .runner { font-size: 34px; }
      .ranking-item { grid-template-columns: 56px 1fr; }
      .ranking-time, .ranking-meta { grid-column: 2 / -1; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="header">
        <h1>이모지 레이스</h1>
        <p class="sub">참가자를 설정한 뒤 설정완료를 누르면 레이스 스테이지가 열립니다. 이후 이벤트 배너 안에서 실제 경주를 시작할 수 있습니다.</p>
      </div>

      <div class="controls">
        <div class="participant-top">
          <div class="participant-title">참가자 설정</div>
          <div class="mini-button-row">
            <button id="addBtn" class="secondary mini-btn">참가자 추가</button>
            <button id="removeBtn" class="secondary mini-btn">참가자 제거</button>
          </div>
        </div>

        <div id="controlGrid" class="control-grid"></div>
        <div id="oddsBoard" class="odds-board"></div>

        <div class="button-row">
          <button id="setupBtn" class="primary">설정완료</button>
          <button id="resetBtn" class="secondary">초기화</button>
          <button id="rerollOddsBtn" class="secondary">승률 다시 뽑기</button>
          <div id="status" class="status">참가자 설정 중</div>
        </div>
      </div>

      <div id="raceStage" class="race-stage">
        <div class="banner">
          <div class="banner-top">
            <div>
              <div class="banner-kicker">RACE EVENT</div>
              <div class="banner-title">이모지 스프린트 배틀</div>
              <div class="banner-sub">설정이 끝났습니다. 아래 버튼을 눌러 레이스를 시작하세요. 중간 이벤트로 흐름이 달라질 수 있습니다.</div>
            </div>
          </div>
          <div class="banner-actions">
            <button id="startRaceBtn" class="start-race-btn">경주 시작</button>
            <button id="backToSetupBtn" class="ghost-btn">설정 다시 보기</button>
          </div>
        </div>

        <div class="hud">
          <div id="eventLog" class="event-log">이벤트 대기 중</div>
          <div id="timerBox" class="timer-box">30.00초</div>
        </div>

        <div id="trackGrid" class="track-grid"></div>
        <div id="result" class="result"></div>
      </div>
    </div>
  </div>

  <script>
    const emojiPool = ['🐰', '🐢', '🐶', '🐱', '🦊', '🐼', '🐯', '🐻', '🐨', '🐸', '🐵', '🦁'];
    const defaultNames = ['토끼', '거북이', '강아지', '고양이', '여우', '판다', '호랑이', '곰', '코알라', '개구리', '원숭이', '사자'];

    const RACE_DURATION = 15;
    const TICK_MS = 100;
    const BASE_PROGRESS_PER_TICK = 1 / (RACE_DURATION * 10);
    const minParticipants = 2;
    const maxParticipants = 12;

    const controlGridEl = document.getElementById('controlGrid');
    const oddsBoardEl = document.getElementById('oddsBoard');
    const raceStageEl = document.getElementById('raceStage');
    const trackGridEl = document.getElementById('trackGrid');
    const resultEl = document.getElementById('result');
    const statusEl = document.getElementById('status');
    const eventLogEl = document.getElementById('eventLog');
    const timerBoxEl = document.getElementById('timerBox');
    const setupBtn = document.getElementById('setupBtn');
    const startRaceBtn = document.getElementById('startRaceBtn');
    const backToSetupBtn = document.getElementById('backToSetupBtn');
    const resetBtn = document.getElementById('resetBtn');
    const rerollOddsBtn = document.getElementById('rerollOddsBtn');
    const addBtn = document.getElementById('addBtn');
    const removeBtn = document.getElementById('removeBtn');

    let participants = [];
    let racers = [];
    let raceTimer = null;
    let raceRunning = false;
    let setupDone = false;
    let raceElapsed = 0;
    let finishOrder = [];
    let boostZone = null;
    let slowZone = null;
    let lastSpurtTargetId = null;
    let globalCrowdBoostUntil = 0;

    function sanitizeName(name, fallback) {
      const trimmed = String(name || '').trim();
      return trimmed || fallback;
    }

    function createParticipant(index) {
      return {
        id: `participant-${index}-${Date.now()}-${Math.random().toString(16).slice(2, 8)}`,
        emoji: emojiPool[index % emojiPool.length],
        name: defaultNames[index] || `참가자 ${index + 1}`,
        odds: 0,
        startBias: 1
      };
    }

    function initParticipants(count = 4) {
      participants = Array.from({ length: count }, (_, index) => createParticipant(index));
      assignOdds();
      assignStartBias();
      generateTrackZones();
    }

    function assignOdds() {
      const weights = participants.map(() => Math.random() * 100 + 20);
      const total = weights.reduce((sum, v) => sum + v, 0);
      let odds = weights.map(v => Math.round((v / total) * 100));
      const diff = 100 - odds.reduce((sum, v) => sum + v, 0);
      if (odds.length) odds[0] += diff;
      participants = participants.map((participant, index) => ({
        ...participant,
        odds: Math.max(1, odds[index])
      }));
    }

    function assignStartBias() {
      participants = participants.map(participant => ({
        ...participant,
        startBias: Number((0.88 + Math.random() * 0.28).toFixed(2))
      }));
    }

    function generateTrackZones() {
      const boostStart = 0.28 + Math.random() * 0.12;
      const slowStart = 0.58 + Math.random() * 0.12;
      boostZone = { start: boostStart, end: Math.min(boostStart + 0.12, 0.55) };
      slowZone = { start: slowStart, end: Math.min(slowStart + 0.12, 0.9) };
    }

    function renderParticipantInputs() {
      controlGridEl.innerHTML = participants.map((participant, index) => `
        <div class="field">
          <label for="name${index}">참가자 ${index + 1}</label>
          <input id="name${index}" data-index="${index}" value="${participant.name}" maxlength="8" ${raceRunning ? 'disabled' : ''} />
        </div>
      `).join('');

      controlGridEl.querySelectorAll('input').forEach(input => {
        input.addEventListener('input', (event) => {
          const index = Number(event.target.dataset.index);
          participants[index].name = sanitizeName(event.target.value, defaultNames[index] || `참가자 ${index + 1}`);
          renderOddsBoard();
          if (setupDone && !raceRunning) buildAndRenderIdleTrack();
        });
      });

      addBtn.disabled = raceRunning || participants.length >= maxParticipants;
      removeBtn.disabled = raceRunning || participants.length <= minParticipants;
      rerollOddsBtn.disabled = raceRunning;
      setupBtn.disabled = raceRunning;
    }

    function renderOddsBoard() {
      oddsBoardEl.innerHTML = participants.map((participant, index) => `
        <div class="odds-card">
          <div class="odds-name">${participant.emoji} ${sanitizeName(participant.name, defaultNames[index] || `참가자 ${index + 1}`)}</div>
          <div class="odds-value">${participant.odds}%</div>
          <div class="odds-caption">예상 우승 확률</div>
        </div>
      `).join('');
    }

    function buildRacers() {
      finishOrder = [];
      lastSpurtTargetId = null;
      globalCrowdBoostUntil = 0;
      racers = participants.map((participant, index) => ({
        ...participant,
        name: sanitizeName(participant.name, defaultNames[index] || `참가자 ${index + 1}`),
        progress: 0,
        finished: false,
        finishTime: null,
        displayFinishTime: null,
        lastSpurtApplied: false
      }));
    }

    function renderTrack() {
      trackGridEl.innerHTML = racers.map((racer, index) => `
        <div class="lane-row">
          <div class="lane-label">${racer.emoji} ${racer.name}</div>
          <div class="single-track" id="lane-line-${index}">
            <div class="single-track-sheen"></div>
            <div class="single-track-dash"></div>
            <div class="single-track-finish"></div>
            <div class="runner" id="runner-${index}">${racer.emoji}</div>
          </div>
          <div class="lane-progress" id="progress-${index}">${raceRunning ? '0%' : `${racer.odds}%`}</div>
        </div>
      `).join('');
      updatePositions();
    }

    function buildAndRenderIdleTrack() {
      racers = participants.map((participant, index) => ({
        ...participant,
        name: sanitizeName(participant.name, defaultNames[index] || `참가자 ${index + 1}`),
        progress: 0,
        finished: false,
        finishTime: null,
        displayFinishTime: null,
        lastSpurtApplied: false
      }));
      renderTrack();
    }

    function getTravelLimit(index) {
      const laneLine = document.getElementById(`lane-line-${index}`);
      const runner = document.getElementById(`runner-${index}`);
      const finish = laneLine ? laneLine.querySelector('.single-track-finish') : null;
      if (!laneLine || !runner || !finish) return 0;
      const runnerWidth = runner.offsetWidth;
      const finishLeft = finish.offsetLeft;
      const finishWidth = finish.offsetWidth;
      return Math.max(0, finishLeft + finishWidth - runnerWidth - 4);
    }

    function updatePositions() {
      racers.forEach((racer, index) => {
        const runner = document.getElementById(`runner-${index}`);
        const progress = document.getElementById(`progress-${index}`);
        if (!runner || !progress) return;
        const travelLimit = getTravelLimit(index);
        const actualX = travelLimit * racer.progress;
        runner.style.transform = `translate(${actualX}px, -50%)`;
        progress.textContent = raceRunning || racer.finished
          ? `${Math.min(100, Math.round(racer.progress * 100))}%`
          : `${racer.odds}%`;
      });
    }

    function medalFor(index) {
      if (index === 0) return '🥇';
      if (index === 1) return '🥈';
      if (index === 2) return '🥉';
      return `${index + 1}위`;
    }

    function formatFinishTime(value) {
      return `${Number(value).toFixed(2)}초`;
    }

    function renderIdleResult(message = '설정완료를 누르면 레이스 스테이지가 열립니다.') {
      resultEl.innerHTML = `<div class="result-title">${message}</div>`;
    }

    function renderRankingResult() {
      const winner = finishOrder[0] || racers.slice().sort((a, b) => b.progress - a.progress)[0];
      const ordered = finishOrder.length === racers.length ? finishOrder : racers.slice().sort((a, b) => b.progress - a.progress);
      const rankingHtml = ordered.map((racer, index) => `
        <div class="ranking-item">
          <div class="ranking-place">${medalFor(index)}</div>
          <div class="ranking-name">${racer.emoji} ${racer.name}</div>
          <div class="ranking-time">도착 ${formatFinishTime(racer.displayFinishTime ?? racer.finishTime ?? RACE_DURATION)}</div>
          <div class="ranking-meta">예상 승률 ${racer.odds}%</div>
        </div>
      `).join('');

      resultEl.innerHTML = `
        <div class="result-title">🏆 우승은 ${winner.emoji} ${winner.name}!</div>
        <div class="ranking-list">${rankingHtml}</div>
      `;
    }

    function setEventLog(text) {
      eventLogEl.textContent = text;
    }

    function updateTimerBox() {
      const remain = Math.max(0, RACE_DURATION - raceElapsed);
      timerBoxEl.textContent = `${remain.toFixed(2)}초`;
    }

    function zoneMultiplier(progress) {
      if (progress >= boostZone.start && progress <= boostZone.end) return 1.9;
      if (progress >= slowZone.start && progress <= slowZone.end) return 0.5;
      return 1;
    }

    function maybeApplyLastSpurt() {
      if (lastSpurtTargetId) return;
      const candidates = racers.filter(r => !r.finished && r.progress >= 0.8);
      if (!candidates.length) return;
      const target = candidates[Math.floor(Math.random() * candidates.length)];
      target.lastSpurtApplied = true;
      lastSpurtTargetId = target.id;
      setEventLog(`${target.emoji} ${target.name} 라스트 스퍼트 발동! 막판 가속 시작`);
    }

    function maybeApplyCrowdBoost() {
      if (globalCrowdBoostUntil > raceElapsed) return;
      if (raceElapsed < 10 || raceElapsed > 24) return;
      if (Math.random() < 0.012) {
        globalCrowdBoostUntil = raceElapsed + 2.2;
        setEventLog('관중 함성 폭발! 전원 속도 상승');
      }
    }

    function stepRace() {
      maybeApplyLastSpurt();
      maybeApplyCrowdBoost();

      racers.forEach(racer => {
        if (racer.finished) return;
        const randomFactor = 0.7 + Math.random() * 0.7;
        let delta = BASE_PROGRESS_PER_TICK * randomFactor;
        if (raceElapsed < 6) delta *= racer.startBias;
        delta *= zoneMultiplier(racer.progress);
        if (racer.lastSpurtApplied) delta *= 1.65;
        if (globalCrowdBoostUntil > raceElapsed) delta *= 1.22;
        racer.progress = Math.min(1, racer.progress + delta);
        if (racer.progress >= 1 && !racer.finished) {
          racer.finished = true;
          racer.finishTime = raceElapsed;
          racer.displayFinishTime = raceElapsed;
          finishOrder.push({ ...racer });
        }
      });

      updatePositions();

      if (finishOrder.length > 0 && finishOrder.length < racers.length) {
        const leader = finishOrder[0];
        resultEl.innerHTML = `<div class="result-title">현재 1위는 ${leader.emoji} ${leader.name}, 나머지 순위 집계 중...</div>`;
      }
    }

    function finalizeUnfinishedRacers() {
      const pending = racers.filter(r => !r.finished).sort((a, b) => b.progress - a.progress);
      const startTime = Math.max(raceElapsed, 0);
      pending.forEach((racer, index) => {
        racer.finished = true;
        racer.finishTime = RACE_DURATION;
        racer.displayFinishTime = Number((startTime + (index + 1) * 0.01).toFixed(2));
        finishOrder.push({ ...racer });
      });
    }

    function resetRace(message = '설정완료를 누르면 레이스 스테이지가 열립니다.') {
      clearInterval(raceTimer);
      raceTimer = null;
      raceRunning = false;
      setupDone = false;
      raceElapsed = 0;
      assignStartBias();
      generateTrackZones();
      renderParticipantInputs();
      renderOddsBoard();
      raceStageEl.classList.remove('active');
      document.querySelector('.controls').style.display = 'grid';
      resultEl.innerHTML = '';
      setEventLog('이벤트 대기 중');
      updateTimerBox();
      statusEl.textContent = '참가자 설정 중';
      renderIdleResult(message);
    }

    function openStage() {
      if (raceRunning) return;
      setupDone = true;
      raceStageEl.classList.add('active');
      document.querySelector('.controls').style.display = 'none';
      buildAndRenderIdleTrack();
      renderIdleResult('이벤트 배너 안의 경기시작 버튼을 눌러 진행하세요.');
      setEventLog('스테이지 준비 완료');
      statusEl.textContent = '설정 완료';
      updatePositions();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function finishRace() {
      clearInterval(raceTimer);
      raceTimer = null;
      raceRunning = false;
      renderParticipantInputs();
      statusEl.textContent = '경주 종료';
      setEventLog('경기 종료, 최종 순위 확정');
      updateTimerBox();
      renderRankingResult();
      updatePositions();
    }

    function startRace() {
      if (raceRunning) return;
      if (!setupDone) openStage();
      raceRunning = true;
      raceElapsed = 0;
      buildRacers();
      renderTrack();
      renderParticipantInputs();
      updateTimerBox();
      statusEl.textContent = '경주 중...';
      setEventLog('출발! 초반 스타트 경쟁 시작');
      renderIdleResult('출발! 랜덤 이벤트와 함께 순위를 집계 중입니다.');

      raceTimer = setInterval(() => {
        raceElapsed = Number((raceElapsed + TICK_MS / 1000).toFixed(2));
        stepRace();
        updateTimerBox();
        if (raceElapsed >= RACE_DURATION || finishOrder.length === racers.length) {
          if (finishOrder.length < racers.length) finalizeUnfinishedRacers();
          finishRace();
        }
      }, TICK_MS);
    }

    function rerollOdds() {
      if (raceRunning) return;
      assignOdds();
      renderOddsBoard();
      if (setupDone && !raceRunning) buildAndRenderIdleTrack();
    }

    function addParticipant() {
      if (raceRunning || participants.length >= maxParticipants) return;
      participants.push(createParticipant(participants.length));
      assignOdds();
      renderParticipantInputs();
      renderOddsBoard();
      if (setupDone) buildAndRenderIdleTrack();
    }

    function removeParticipant() {
      if (raceRunning || participants.length <= minParticipants) return;
      participants.pop();
      assignOdds();
      renderParticipantInputs();
      renderOddsBoard();
      if (setupDone) buildAndRenderIdleTrack();
    }

    setupBtn.addEventListener('click', openStage);
    startRaceBtn.addEventListener('click', startRace);
    backToSetupBtn.addEventListener('click', () => {
      if (raceRunning) return;
      raceStageEl.classList.remove('active');
      document.querySelector('.controls').style.display = 'grid';
      setupDone = false;
      statusEl.textContent = '참가자 설정 중';
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });
    resetBtn.addEventListener('click', () => resetRace());
    rerollOddsBtn.addEventListener('click', rerollOdds);
    addBtn.addEventListener('click', addParticipant);
    removeBtn.addEventListener('click', removeParticipant);
    window.addEventListener('resize', updatePositions);

    initParticipants(4);
    renderParticipantInputs();
    renderOddsBoard();
    resetRace();
  </script>
</body>
</html>
