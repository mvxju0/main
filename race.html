<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>애니멀런</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(180deg, #fff9f2, #ffe8d9);
      color: #222;
      padding: 20px 14px 32px;
    }

    .wrap {
      width: 100%;
      max-width: 920px;
      margin: 0 auto;
    }

    .screen {
      display: none;
    }

    .screen.show {
      display: block;
    }

    .panel {
      background: rgba(255,255,255,0.94);
      border-radius: 24px;
      padding: 20px;
      box-shadow: 0 10px 28px rgba(0,0,0,0.08);
      margin-bottom: 16px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 30px;
      text-align: center;
    }

    .sub {
      margin: 0;
      text-align: center;
      color: #666;
      font-size: 15px;
    }

    .section-title {
      margin: 0 0 14px;
      font-size: 20px;
    }

    .animal-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin-top: 16px;
    }

    .animal-btn {
      border: 1px solid #ffd8c4;
      background: #fff8f1;
      color: #7a4b33;
      border-radius: 16px;
      padding: 14px 10px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.15s ease, opacity 0.15s ease;
    }

    .animal-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 16px rgba(255,123,84,0.12);
    }

    .animal-btn:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .participants {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 12px;
    }

    .participant {
      display: grid;
      grid-template-columns: 60px 1fr auto auto;
      gap: 10px;
      align-items: center;
      background: #fff8f1;
      border: 1px solid #ffe0cc;
      border-radius: 14px;
      padding: 12px 14px;
    }

    .emoji {
      font-size: 30px;
      text-align: center;
      line-height: 1;
    }

    .name {
      font-size: 16px;
      font-weight: bold;
    }

    .chance {
      color: #8a5b43;
      font-weight: bold;
      white-space: nowrap;
    }

    .empty {
      text-align: center;
      color: #777;
      padding: 20px 0 8px;
    }

    .helper {
      margin-top: 12px;
      color: #666;
      font-size: 14px;
    }

    .action-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 16px;
    }

    button {
      font: inherit;
      border: 0;
      border-radius: 14px;
      padding: 0 18px;
      height: 48px;
      font-weight: bold;
      cursor: pointer;
      background: #ff7b54;
      color: #fff;
      transition: transform 0.15s ease, opacity 0.15s ease, box-shadow 0.15s ease;
    }

    button:hover {
      transform: translateY(-1px);
    }

    button:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    .ghost-btn {
      background: #fff3ea;
      color: #b45533;
      border: 1px solid #ffd3be;
    }

    .danger-btn {
      height: 36px;
      border-radius: 10px;
      background: #fff1f1;
      color: #c44;
      border: 1px solid #f3c9c9;
      padding: 0 12px;
    }

    .primary-wide {
      flex: 1;
      min-width: 220px;
    }

    .race-status {
      text-align: center;
      font-size: 22px;
      font-weight: bold;
      min-height: 34px;
      margin-bottom: 14px;
    }

    .race-status.hot {
      color: #c85a16;
      animation: blink 0.45s ease-in-out infinite alternate;
    }

    .race-status.finish {
      color: #c92b2b;
    }

    @keyframes blink {
      from { opacity: 0.68; transform: scale(1); }
      to { opacity: 1; transform: scale(1.02); }
    }

    .track-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .track {
      position: relative;
      background: #fff8f1;
      border: 1px solid #ffe0cc;
      border-radius: 16px;
      padding: 12px 14px 16px;
      overflow: hidden;
    }

    .track.first-place {
      box-shadow: 0 0 0 2px #ffd86f inset, 0 0 20px rgba(255, 204, 0, 0.18);
    }

    .track.second-place {
      box-shadow: 0 0 0 2px #ffcaa8 inset, 0 0 20px rgba(255, 136, 51, 0.12);
    }

    .track-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 10px;
    }

    .track-name {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: bold;
    }

    .lane-wrap {
      position: relative;
      padding-right: 28px;
    }

    .lane {
      position: relative;
      height: 20px;
      background: linear-gradient(90deg, #f7e7db, #fdf3ec);
      border-radius: 999px;
      overflow: visible;
    }

    .runner {
      position: absolute;
      top: 50%;
      left: 0;
      font-size: 30px;
      line-height: 1;
      transform: translate(0, -50%);
      will-change: transform;
    }

    .finish-line {
      position: absolute;
      right: 8px;
      top: -4px;
      bottom: -4px;
      width: 8px;
      border-radius: 999px;
      background: repeating-linear-gradient(
        to bottom,
        #222 0 8px,
        #fff 8px 16px
      );
      opacity: 0.28;
    }

    .result-box {
      margin-top: 16px;
      background: #fff8f1;
      border: 1px solid #ffe0cc;
      border-radius: 16px;
      padding: 16px;
      display: none;
    }

    .result-box.show {
      display: block;
    }

    .result-title {
      font-size: 22px;
      font-weight: bold;
      margin-bottom: 8px;
    }

    .result-sub {
      color: #6a5a50;
      margin-bottom: 8px;
      font-size: 15px;
    }

    .result-comment {
      color: #b45533;
      font-weight: bold;
      margin-bottom: 14px;
      font-size: 16px;
    }

    .ranking {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 14px;
    }

    .ranking-item {
      background: #fff;
      border: 1px solid #f2dfd0;
      border-radius: 12px;
      padding: 10px 12px;
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
    }

    .ranking-left {
      display: flex;
      gap: 10px;
      align-items: center;
      font-weight: bold;
    }

    .result-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .double-btn {
      flex: 1;
      min-width: 220px;
      font-size: 18px;
      height: 54px;
      border-radius: 16px;
      background: linear-gradient(90deg, #ff6b3d, #ff8d5f);
      box-shadow: 0 10px 24px rgba(255,107,61,0.28);
    }

    .history-mini {
      margin-top: 8px;
      color: #7a655b;
      font-size: 14px;
    }

    @media (max-width: 760px) {
      .animal-grid {
        grid-template-columns: repeat(2, 1fr);
      }

      .participant {
        grid-template-columns: 54px 1fr;
      }

      .chance {
        justify-self: start;
      }

      .danger-btn {
        justify-self: end;
      }

      .track-top {
        flex-direction: column;
        align-items: flex-start;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <!-- 설정 화면 -->
    <div class="screen show" id="setupScreen">
      <div class="panel">
        <h1>애니멀런</h1>
        <p class="sub">동물을 추가하고 예상 우승 확률을 확인한 뒤 레이스를 시작하세요.</p>

        <h2 class="section-title" style="margin-top:20px;">참가자 추가</h2>
        <div class="animal-grid" id="animalGrid"></div>

        <h2 class="section-title" style="margin-top:22px;">참가자 목록</h2>
        <div class="participants" id="participantsList"></div>
        <div class="empty" id="emptyText">아직 참가자가 없습니다.</div>
        <div class="helper" id="totalChanceText">총 예상 확률: 0%</div>

        <div class="action-row">
          <button id="shuffleBtn" class="ghost-btn">확률 다시 섞기</button>
          <button id="startBtn" class="primary-wide">경주 시작</button>
        </div>
      </div>
    </div>

    <!-- 레이스 화면 -->
    <div class="screen" id="raceScreen">
      <div class="panel">
        <div class="race-status" id="raceStatus">출발 준비 중…</div>
        <div class="track-list" id="trackList"></div>

        <div class="result-box" id="resultBox">
          <div class="result-title" id="resultTitle"></div>
          <div class="result-sub" id="resultSub"></div>
          <div class="result-comment" id="resultComment"></div>
          <div class="ranking" id="ranking"></div>
          <div class="result-actions">
            <button class="double-btn" id="doubleBtn">묻고 더블로 🔥</button>
            <button class="ghost-btn" id="backBtn">설정으로 돌아가기</button>
          </div>
          <div class="history-mini" id="winnerHistory"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const animalOptions = [
      { name: "강아지", emoji: "🐶" },
      { name: "고양이", emoji: "🐱" },
      { name: "토끼", emoji: "🐰" },
      { name: "여우", emoji: "🦊" },
      { name: "곰", emoji: "🐻" },
      { name: "원숭이", emoji: "🐵" },
      { name: "개구리", emoji: "🐸" },
      { name: "판다", emoji: "🐼" }
    ];

    const participants = [];
    let chanceMap = [];
    let currentRaceData = [];
    let raceRunning = false;
    let winnerLog = [];

    const setupScreen = document.getElementById("setupScreen");
    const raceScreen = document.getElementById("raceScreen");

    const animalGrid = document.getElementById("animalGrid");
    const participantsList = document.getElementById("participantsList");
    const emptyText = document.getElementById("emptyText");
    const totalChanceText = document.getElementById("totalChanceText");

    const shuffleBtn = document.getElementById("shuffleBtn");
    const startBtn = document.getElementById("startBtn");

    const raceStatus = document.getElementById("raceStatus");
    const trackList = document.getElementById("trackList");
    const resultBox = document.getElementById("resultBox");
    const resultTitle = document.getElementById("resultTitle");
    const resultSub = document.getElementById("resultSub");
    const resultComment = document.getElementById("resultComment");
    const ranking = document.getElementById("ranking");
    const doubleBtn = document.getElementById("doubleBtn");
    const backBtn = document.getElementById("backBtn");
    const winnerHistory = document.getElementById("winnerHistory");

    function showSetupScreen() {
      setupScreen.classList.add("show");
      raceScreen.classList.remove("show");
    }

    function showRaceScreen() {
      setupScreen.classList.remove("show");
      raceScreen.classList.add("show");
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function randomInt(min, max) {
      return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    function normalizeChances(weights) {
      const total = weights.reduce((a, b) => a + b, 0);
      const raw = weights.map(w => (w / total) * 100);
      const rounded = raw.map(v => Math.floor(v));
      let diff = 100 - rounded.reduce((a, b) => a + b, 0);

      const decimals = raw
        .map((v, i) => ({ i, d: v - Math.floor(v) }))
        .sort((a, b) => b.d - a.d);

      for (let k = 0; k < diff; k++) {
        rounded[decimals[k % decimals.length].i]++;
      }

      return rounded;
    }

    function assignChances() {
      if (participants.length === 0) {
        chanceMap = [];
        return;
      }

      const weights = participants.map(() => randomInt(60, 140));
      chanceMap = normalizeChances(weights);
    }

    function renderAnimalButtons() {
      animalGrid.innerHTML = animalOptions.map((animal) => {
        const count = participants.filter(p => p.name === animal.name).length;
        const disabled = participants.length >= 8;
        return `
          <button class="animal-btn" data-name="${animal.name}" ${disabled ? "disabled" : ""}>
            ${animal.emoji} ${animal.name} 추가
          </button>
        `;
      }).join("");
    }

    function renderParticipants() {
      participantsList.innerHTML = "";

      if (participants.length === 0) {
        emptyText.style.display = "block";
        totalChanceText.textContent = "총 예상 확률: 0%";
      } else {
        emptyText.style.display = "none";

        participants.forEach((p, i) => {
          const row = document.createElement("div");
          row.className = "participant";
          row.innerHTML = `
            <div class="emoji">${p.emoji}</div>
            <div class="name">${p.name}</div>
            <div class="chance">예상 ${chanceMap[i]}%</div>
            <button class="danger-btn" data-index="${i}">삭제</button>
          `;
          participantsList.appendChild(row);
        });

        const sum = chanceMap.reduce((a, b) => a + b, 0);
        totalChanceText.textContent = `총 예상 확률: ${sum}%`;
      }

      renderAnimalButtons();
    }

    function addParticipantByAnimal(name) {
      if (participants.length >= 8) return;
      const found = animalOptions.find(a => a.name === name);
      if (!found) return;

      participants.push({
        id: Date.now() + Math.random(),
        name: found.name,
        emoji: found.emoji
      });

      assignChances();
      renderParticipants();
    }

    function removeParticipant(index) {
      participants.splice(index, 1);
      assignChances();
      renderParticipants();
    }

    function buildRaceData() {
      currentRaceData = participants.map((p, i) => ({
        ...p,
        chance: chanceMap[i],
        progress: 0,
        speed: 0,
        finishedAt: null,
        rank: null
      }));
    }

    function renderTracks() {
      trackList.innerHTML = currentRaceData.map((p, i) => `
        <div class="track" id="track-${i}">
          <div class="track-top">
            <div class="track-name">
              <div class="emoji">${p.emoji}</div>
              <div>${p.name}</div>
            </div>
            <div>예상 우승 ${p.chance}%</div>
          </div>
          <div class="lane-wrap">
            <div class="lane" id="lane-${i}">
              <div class="runner" id="runner-${i}">${p.emoji}</div>
            </div>
            <div class="finish-line"></div>
          </div>
        </div>
      `).join("");
    }

    function weightedBaseSpeed(chance) {
      return 0.48 + (chance / 100) * 0.34;
    }

    function sleep(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    function updateRunnerPosition(index, progress) {
      const lane = document.getElementById(`lane-${index}`);
      const runner = document.getElementById(`runner-${index}`);
      if (!lane || !runner) return;

      const laneWidth = lane.clientWidth;
      const runnerWidth = runner.clientWidth || 30;
      const maxX = laneWidth - runnerWidth;
      const x = (progress / 100) * maxX;

      runner.style.transform = `translate(${x}px, -50%)`;
    }

    function classifyRaceComment(winner, second, diffSec) {
      if (winner.chance <= 18) {
        return "이변 발생! 낮은 확률을 뚫고 우승했습니다.";
      }
      if (diffSec <= 0.10) {
        return "초접전 승부! 결승선 앞에서 끝까지 뒤집혔습니다.";
      }
      if (winner.chance >= 35) {
        return "예상대로 강하게 밀어붙인 우승입니다.";
      }
      if (diffSec <= 0.25) {
        return "막판 집중력이 승부를 갈랐습니다.";
      }
      return "무난해 보였지만 흐름이 계속 흔들린 레이스였습니다.";
    }

    function updateWinnerHistory() {
      if (winnerLog.length === 0) {
        winnerHistory.textContent = "";
        return;
      }
      winnerHistory.textContent = `최근 우승: ${winnerLog.slice(-5).reverse().join(" → ")}`;
    }

    async function startRace() {
      if (participants.length < 2) {
        alert("참가자는 최소 2명 이상이어야 합니다.");
        return;
      }
      if (raceRunning) return;

      raceRunning = true;
      resultBox.classList.remove("show");
      raceStatus.classList.remove("hot", "finish");
      raceStatus.textContent = "출발 준비 중…";

      showRaceScreen();
      buildRaceData();
      renderTracks();

      currentRaceData.forEach((_, i) => updateRunnerPosition(i, 0));

      await sleep(500);
      raceStatus.textContent = "3";
      await sleep(500);
      raceStatus.textContent = "2";
      await sleep(500);
      raceStatus.textContent = "1";
      await sleep(500);
      raceStatus.textContent = "출발!";
      await sleep(300);

      const raceStart = performance.now();
      let finishCount = 0;
      let animationFrame = null;
      let nearFinishTriggered = false;
      let slowMotionTriggered = false;

      function frame(now) {
        const elapsed = now - raceStart;
        const sortedByProgress = [...currentRaceData].sort((a, b) => b.progress - a.progress);

        currentRaceData.forEach((p, i) => {
          if (p.finishedAt !== null) return;

          let speed = weightedBaseSpeed(p.chance);

          if (elapsed < 1800) {
            speed += (Math.random() - 0.5) * 0.12;
          }

          if (p.progress > 18 && p.progress < 78) {
            speed += (Math.random() - 0.5) * 1.35;
          }

          if (p.progress >= 78 && p.progress < 90) {
            speed += (Math.random() - 0.5) * 0.7;
          }

          const first = sortedByProgress[0];
          const second = sortedByProgress[1];

          if (first && second && first.progress >= 88 && second.progress >= 86) {
            if (!slowMotionTriggered) {
              raceStatus.textContent = "막판 승부, 속도가 흔들립니다!";
              raceStatus.classList.add("hot");
            }
            slowMotionTriggered = true;
          }

          if (p.progress >= 90 && first && second) {
            const isTopTwo = p.id === first.id || p.id === second.id;
            if (isTopTwo) {
              const swing = Math.sin(now / 120) * 1.1;
              speed += swing;
              speed *= 0.72;

              if (!nearFinishTriggered) {
                raceStatus.textContent = "결승선 앞 초접전!";
                raceStatus.classList.add("hot");
              }
              nearFinishTriggered = true;
            } else {
              speed *= 0.62;
            }
          }

          speed = Math.max(0.06, speed);
          p.progress += speed;

          if (p.progress >= 100) {
            p.progress = 100;
            p.finishedAt = now;
            finishCount++;
            p.rank = finishCount;
          }

          updateRunnerPosition(i, p.progress);
        });

        document.querySelectorAll(".track").forEach(el => {
          el.classList.remove("first-place", "second-place");
        });

        const liveSorted = [...currentRaceData].sort((a, b) => b.progress - a.progress);
        if (liveSorted[0]) {
          const idx1 = currentRaceData.findIndex(x => x.id === liveSorted[0].id);
          document.getElementById(`track-${idx1}`)?.classList.add("first-place");
        }
        if (liveSorted[1]) {
          const idx2 = currentRaceData.findIndex(x => x.id === liveSorted[1].id);
          document.getElementById(`track-${idx2}`)?.classList.add("second-place");
        }

        if (finishCount === currentRaceData.length) {
          finalizeRace();
          raceRunning = false;
          cancelAnimationFrame(animationFrame);
          return;
        }

        animationFrame = requestAnimationFrame(frame);
      }

      function finalizeRace() {
        const result = [...currentRaceData].sort((a, b) => {
          if (a.rank !== null && b.rank !== null) return a.rank - b.rank;
          return (a.finishedAt || Infinity) - (b.finishedAt || Infinity);
        });

        const winner = result[0];
        const second = result[1];

        raceStatus.classList.remove("hot");
        raceStatus.classList.add("finish");
        raceStatus.textContent = `${winner.emoji} ${winner.name} 우승!`;

        let diffSec = 0;
        let diffText = "";
        if (winner && second && winner.finishedAt && second.finishedAt) {
          diffSec = Number(((second.finishedAt - winner.finishedAt) / 1000).toFixed(2));
          diffText = `${diffSec.toFixed(2)}초 차이`;
        }

        resultTitle.textContent = `${winner.emoji} ${winner.name} 우승!`;
        resultSub.textContent = second
          ? `예상 우승 확률 ${winner.chance}% · 2위와 ${diffText}`
          : `예상 우승 확률 ${winner.chance}%`;

        resultComment.textContent = classifyRaceComment(winner, second, diffSec);

        ranking.innerHTML = result.map((p, idx) => `
          <div class="ranking-item">
            <div class="ranking-left">
              <div>${idx + 1}위</div>
              <div>${p.emoji}</div>
              <div>${p.name}</div>
            </div>
            <div>예상 ${p.chance}%</div>
          </div>
        `).join("");

        winnerLog.push(`${winner.emoji} ${winner.name}`);
        updateWinnerHistory();
        resultBox.classList.add("show");
      }

      requestAnimationFrame(frame);
    }

    animalGrid.addEventListener("click", (e) => {
      const btn = e.target.closest(".animal-btn");
      if (!btn) return;
      addParticipantByAnimal(btn.dataset.name);
    });

    participantsList.addEventListener("click", (e) => {
      const btn = e.target.closest(".danger-btn");
      if (!btn) return;
      removeParticipant(Number(btn.dataset.index));
    });

    shuffleBtn.addEventListener("click", () => {
      if (participants.length === 0) return;
      assignChances();
      renderParticipants();
    });

    startBtn.addEventListener("click", startRace);
    doubleBtn.addEventListener("click", startRace);
    backBtn.addEventListener("click", () => {
      if (raceRunning) return;
      showSetupScreen();
    });

    // 초기 버튼 렌더
    renderAnimalButtons();
    renderParticipants();
  </script>
</body>
</html>
