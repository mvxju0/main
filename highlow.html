<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>하이앤로우</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:linear-gradient(180deg,#fff9f2,#ffe8d9);
}

.wrap {
  max-width:520px;
  margin:auto;
  padding:20px;
}

.panel {
  background:white;
  border-radius:20px;
  padding:20px;
  box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

.card {
  font-size:80px;
  text-align:center;
  margin:20px 0;
  transition:0.3s;
}

.glow {
  text-shadow:0 0 15px gold;
}

.btn {
  width:100%;
  padding:16px;
  margin:6px 0;
  font-size:20px;
  border:none;
  border-radius:12px;
  background:#ff7b54;
  color:white;
}

.result {
  text-align:center;
  min-height:40px;
  font-size:20px;
  margin-top:10px;
}

.warning { color:#ff9800; }
.danger { color:#ff4d4d; }
.success { color:#00b894; }

</style>

</head>
<body>

<div class="wrap">
<div class="panel">

<h2>하이앤로우</h2>

<div id="coin">코인:100</div>
<div id="pool">보상:0</div>
<div id="title"></div>

<div class="card" id="card">?</div>

<div id="hint"></div>

<button class="btn" onclick="play('high')">HIGH</button>
<button class="btn" onclick="play('low')">LOW</button>

<button class="btn" onclick="stopGame()">STOP</button>

<div class="result" id="result"></div>

</div>
</div>

<script>

let coin=100,pool=0,streak=0;
let current=draw();

function draw(){ return Math.floor(Math.random()*13)+1; }

function play(type){

  let result=document.getElementById("result");
  let cardEl=document.getElementById("card");

  // 선택 반응
  cardEl.style.transform="scale(1.2)";

  setTimeout(()=>{
    cardEl.style.transform="scale(1)";
  },150);

  // 착각 문구
  document.getElementById("hint").innerText=
    Math.random()>0.5?"이번엔 HIGH 흐름인데…":"LOW 쪽이 유력하다…";

  let next=draw();

  result.innerText="뒤집는 중...";

  // 긴장 멈춤
  setTimeout(()=>{
    
    let win=false;

    if(type==="high" && next>current) win=true;
    if(type==="low" && next<current) win=true;

    if(streak>=5 && Math.random()<0.15) win=false;

    // 거의 맞을뻔
    let near=Math.abs(next-current)===1;

    if(win){
      streak++;
      let reward=Math.floor(20*(2+streak*0.3));
      pool+=reward;

      result.innerText="🔥 성공 +" + reward;
      result.className="result success";

      if(streak>=3){
        cardEl.classList.add("glow");
      }

    }else{

      let loss=pool;
      pool=0;

      // 슬로우 파괴
      if(streak>=4){
        result.innerText="여기서… 끝난다";
      }else{
        result.innerText="💀 실패 -" + loss;
      }

      result.className="result danger";

      streak=0;
      cardEl.classList.remove("glow");
    }

    if(near){
      result.innerText+=" (아깝다)";
    }

    current=next;

    update();

  },700);
}

function stopGame(){

  let gain=pool;
  coin+=gain;

  // 코인 흡수 연출
  document.getElementById("result").innerText="+"+gain+" 흡수";

  pool=0;
  streak=0;

  update();
}

function update(){

  document.getElementById("card").innerText=current;
  document.getElementById("coin").innerText="코인:"+coin;
  document.getElementById("pool").innerText="보상:"+pool;

  let title="";

  if(streak>=7) title="🔥 멈출 수 없음";
  else if(streak>=5) title="🔥 폭주 상태";
  else if(streak>=3) title="흐름 탑승";

  document.getElementById("title").innerText=title;

}

update();

</script>

</body>
</html>
