<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>하이앤로우</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:white;
  text-align:center;
}

.container {
  max-width:500px;
  margin:auto;
  padding:20px;
}

.card {
  font-size:80px;
  margin:20px 0;
}

.btn {
  width:100%;
  padding:16px;
  margin:8px 0;
  font-size:20px;
  font-weight:bold;
  border:none;
  border-radius:12px;
  background:#D8006C;
  color:white;
}

.result {
  font-size:22px;
  margin:15px 0;
  min-height:30px;
}

.warning {
  color:#ffcc00;
}

.danger {
  color:#ff4d4d;
}

.success {
  color:#00ffcc;
}

.stats {
  margin-top:30px;
  padding:15px;
  background:#1e293b;
  border-radius:12px;
  font-size:14px;
}
</style>
</head>

<body>

<div class="container">

<h2>하이앤로우</h2>

<div id="coin">코인: 100</div>
<div id="pool">보상 풀: 0</div>
<div id="streak">연승: 0</div>

<div class="card" id="card">?</div>

<button class="btn" onclick="choose('high')">HIGH</button>
<button class="btn" onclick="choose('low')">LOW</button>

<div class="result" id="result"></div>

<button class="btn" onclick="cashOut()">수익 확정</button>

<div class="stats" id="stats"></div>

</div>

<script>

let coin = 100;
let pool = 0;
let streak = 0;
let games = 0;
let wins = 0;

let maxCoin = 100;
let minCoin = 100;
let maxProfit = 0;
let maxLoss = 0;

let currentCard = draw();

updateUI();

function draw(){
  return Math.floor(Math.random()*13)+1;
}

function displayCard(n){
  return n;
}

function choose(type){

  let next = draw();
  let resultText = document.getElementById("result");

  resultText.innerHTML = "카드 공개 중...";
  
  setTimeout(()=>{

    let win = false;

    if(type==="high" && next > currentCard) win = true;
    if(type==="low" && next < currentCard) win = true;

    // 연승 높을수록 실패 확률 증가
    if(streak >= 5){
      if(Math.random() < 0.15) win = false;
    }

    if(win){
      wins++;
      streak++;

      let multiplier = 2 + (streak * 0.3);
      let reward = Math.floor(20 * multiplier);

      pool += reward;

      resultText.innerHTML = "성공 🔥 +" + reward;
      resultText.className="result success";

    }else{
      let loss = pool;
      pool = 0;
      streak = 0;

      resultText.innerHTML = "실패 💀 -" + loss;
      resultText.className="result danger";

      if(loss > maxLoss) maxLoss = loss;
    }

    currentCard = next;
    games++;

    updateUI();

  },500);
}

function cashOut(){
  coin += pool;

  if(pool > maxProfit) maxProfit = pool;

  pool = 0;
  streak = 0;

  updateUI();
}

function updateUI(){

  document.getElementById("card").innerText = displayCard(currentCard);
  document.getElementById("coin").innerText = "코인: " + coin;
  document.getElementById("pool").innerText = "보상 풀: " + pool;
  document.getElementById("streak").innerText = "연승: " + streak;

  if(coin > maxCoin) maxCoin = coin;
  if(coin < minCoin) minCoin = coin;

  let winRate = games ? Math.floor((wins/games)*100) : 0;

  document.getElementById("stats").innerHTML = `
    승률: ${winRate}%<br>
    플레이: ${games}<br><br>
    최고 잔고: ${maxCoin}<br>
    최저 잔고: ${minCoin}<br><br>
    최대 수익: +${maxProfit}<br>
    최대 손실: -${maxLoss}
  `;
}

</script>

</body>
</html>
