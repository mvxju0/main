<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>하이앤로우</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background: linear-gradient(180deg,#fff9f2,#ffe8d9);
  color:#333;
}

.wrap {
  max-width:520px;
  margin:auto;
  padding:20px;
}

.panel {
  background:white;
  border-radius:20px;
  padding:20px;
  box-shadow:0 10px 25px rgba(0,0,0,0.1);
  margin-bottom:15px;
}

h1 {
  text-align:center;
  margin-bottom:10px;
}

.guide {
  background:#fff3ea;
  padding:12px;
  border-radius:12px;
  font-size:14px;
  color:#7a5b4a;
  margin-bottom:15px;
}

.card {
  font-size:70px;
  text-align:center;
  margin:20px 0;
}

.btn {
  width:100%;
  padding:18px;
  margin:8px 0;
  font-size:20px;
  font-weight:bold;
  border:none;
  border-radius:14px;
  background:#ff7b54;
  color:white;
}

.btn:hover {
  transform:scale(1.03);
}

.stop {
  background:#999;
}

.result {
  text-align:center;
  font-size:20px;
  min-height:30px;
  margin-top:10px;
}

.streak {
  text-align:center;
  font-weight:bold;
  margin-top:10px;
}

.stats {
  font-size:14px;
  margin-top:10px;
  line-height:1.6;
}
</style>

</head>
<body>

<div class="wrap">

<div class="panel">
<h1>하이앤로우</h1>

<div class="guide">
현재 카드보다 높은지 낮은지 맞추세요.<br>
연승이 쌓일수록 보상이 커지지만 실패하면 전부 잃습니다.
</div>

<div id="coin">코인: 100</div>
<div id="pool">보상: 0</div>
<div id="multiplier">배당: x2</div>

<div class="card" id="card">?</div>

<button class="btn" onclick="play('high')">HIGH</button>
<button class="btn" onclick="play('low')">LOW</button>

<button class="btn stop" onclick="stopGame()">STOP</button>

<div class="result" id="result"></div>
<div class="streak" id="streak"></div>

</div>

<div class="panel stats" id="stats"></div>

</div>

<script>

let coin=100;
let pool=0;
let streak=0;
let current=draw();

let games=0,wins=0;
let maxCoin=100,minCoin=100;
let maxProfit=0,maxLoss=0;

update();

function draw(){
  return Math.floor(Math.random()*13)+1;
}

function play(type){

  let next=draw();
  let result=document.getElementById("result");

  result.innerText="카드 공개 중...";

  setTimeout(()=>{

    let win=false;

    if(type==="high" && next>current) win=true;
    if(type==="low" && next<current) win=true;

    // 연승 증가 시 실패확률 증가
    if(streak>=5 && Math.random()<0.15){
      win=false;
    }

    if(win){
      wins++;
      streak++;

      let multi=2+(streak*0.3);
      let reward=Math.floor(20*multi);

      pool+=reward;

      result.innerText="🔥 성공 +" + reward;

    }else{

      let loss=pool;
      pool=0;
      streak=0;

      result.innerText="💀 실패 -" + loss;

      if(loss>maxLoss) maxLoss=loss;
    }

    // 거의 맞을뻔 연출
    if(Math.abs(next-current)===1){
      result.innerText+=" (아깝다)";
    }

    current=next;
    games++;

    update();

  },600);
}

function stopGame(){

  coin+=pool;

  if(pool>maxProfit) maxProfit=pool;

  pool=0;
  streak=0;

  update();
}

function update(){

  document.getElementById("card").innerText=current;
  document.getElementById("coin").innerText="코인: "+coin;
  document.getElementById("pool").innerText="보상: "+pool;

  let multi=2+(streak*0.3);
  document.getElementById("multiplier").innerText="배당: x"+multi.toFixed(1);

  let streakText="연승: "+streak;

  if(streak>=5) streakText+=" 🔥🔥";
  else if(streak>=3) streakText+=" 🔥";

  document.getElementById("streak").innerText=streakText;

  if(coin>maxCoin) maxCoin=coin;
  if(coin<minCoin) minCoin=coin;

  let winRate=games?Math.floor(wins/games*100):0;

  document.getElementById("stats").innerHTML=`
  승률: ${winRate}%<br>
  플레이: ${games}<br><br>
  최고 잔고: ${maxCoin}<br>
  최저 잔고: ${minCoin}<br><br>
  최대 수익: +${maxProfit}<br>
  최대 손실: -${maxLoss}
  `;
}

</script>

</body>
</html>
